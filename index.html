<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash cards</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="cabecalho">
        <h1 class="cabechalho-titulo">Confere aí</h1>
        <nav>
            <a href="#" class="menu-inicio"> Iniciar </a>
        </nav>
    </header>

    <main class="principal">
        <section>
            <article class="cartao">
                <div class="cartoes">

                    <div class="cartao-frente">
                        <img src="camaleao.jpg" alt="" class="cartao-imagem">
                        <p class="cartao-texto-frente">
                            Camaleões mudam de cor apenas para se camuflar.
                        </p>
                    </div>

                </div>
                <div class="cartao-verso">
                    <img src="" alt="" class="cartao-imagem">
                    <p class="cartao-texto-verso">
                        Mito! Eles mudam de cor principalmente para regular a temperatura e expressar humor.
                    </p>
                </div>

            </article>
        </section>
    </main>

    <footer class="rodape">
        <p class="rodape-texto">
            Projeto desenvolvido por Yasmin V.
        </p>
    </footer>

</body>

</html>
